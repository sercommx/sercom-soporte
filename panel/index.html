<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SercomDesk — Centro de Operaciones de TI</title>
  <link rel="icon" type="image/x-icon" href="/soporte/download/favicon?v=2.0.1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060913;
      --surface: rgba(17, 24, 39, 0.7);
      --surface-card: rgba(31, 41, 55, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --border-active: rgba(0, 102, 204, 0.6);
      --accent: #0066cc;
      --accent-glow: rgba(0, 102, 204, 0.35);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 50% 0%, #111a2e 0%, var(--bg) 70%);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- LOGIN SCREEN (GLASSMORPHISM) --- */
    /* Loader de sesión — visible mientras se verifica la cookie */
    #session-loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #111827 0%, #030712 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      flex-direction: column;
      gap: 16px;
    }
    #session-loader .sl-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99,179,237,0.2);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #session-loader p {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-family: inherit;
    }

    #login-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #111827 0%, #030712 100%);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-card {
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      width: 440px;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 100px rgba(0, 102, 204, 0.15);
      text-align: center;
    }

    .login-logo {
      height: 80px;
      width: auto;
      margin-bottom: 24px;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-login:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 24px rgba(0, 102, 204, 0.5);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    #login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 16px;
      min-height: 20px;
    }

    /* --- DASHBOARD HEADER --- */
    #header {
      background: rgba(17, 24, 39, 0.85);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .header-badge {
      background: rgba(0, 102, 204, 0.15);
      border: 1px solid var(--accent);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* --- MAIN CONTENT LAYOUT --- */
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
    }

    #agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
    }

    /* --- HARDWARE INFO EN TARJETAS --- */
    .agent-host { font-size: 15px; font-weight: 600; color: #e2e8f0; }
    .hw-device-type { display: inline-flex; align-items: center; gap: 5px; font-size: 11px;
      font-weight: 600; padding: 2px 8px; border-radius: 20px; background: rgba(99,179,237,0.12);
      color: #63b3ed; border: 1px solid rgba(99,179,237,0.25); margin-top: 2px; width: fit-content; }
    .hw-make-model { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .hw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
    .hw-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 9px 12px; }
    .hw-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 4px; }
    .hw-value { font-size: 12px; color: #e2e8f0; font-weight: 500; line-height: 1.4; word-break: break-word; }
    .hw-value small { font-size: 10px; color: var(--text-muted); }
    .hw-disk-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .hw-disk-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .hw-disk-bar { height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #48bb78, #38a169); transition: width 0.5s ease; }
    .hw-disk-bar.warn { background: linear-gradient(90deg, #ed8936, #dd6b20); }
    .hw-disk-bar.crit { background: linear-gradient(90deg, #fc8181, #e53e3e); }
    .hw-ram-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .hw-ram-pill { font-size: 10px; padding: 2px 6px; border-radius: 4px;
      background: rgba(159,122,234,0.15); color: #b794f4; border: 1px solid rgba(159,122,234,0.2); }

    /* --- ENTERPRISE AGENT CARD --- */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s;
    }

    .agent-card:hover {
      border-color: var(--border-active);
      box-shadow: 0 10px 30px rgba(0, 102, 204, 0.1);
    }

    .agent-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .agent-id-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .pulse-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
      animation: pulse 1.8s infinite;
    }

    .agent-host {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: -10px;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
    }

    .system-badge-row {
      display: flex;
      gap: 8px;
    }

    .sys-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-action {
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-action:hover {
      background: var(--border);
      border-color: #4b5563;
    }

    .btn-action.primary {
      background: var(--accent);
      border-color: transparent;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-action.primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 20px rgba(0, 102, 204, 0.5);
    }

    /* --- ACTIVE LIVE SESSION CONTROLLER (FULLSCREEN) --- */
    #session-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #03050a;
      z-index: 500;
      flex-direction: row;
    }

    #session-view.active { display: flex; }

    #session-sidebar {
      width: 380px;
      background: rgba(17, 24, 39, 0.85);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
      z-index: 600;
    }

    #session-info-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    #session-info-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .live-stream-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    #screen-canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 10;
    }

    #stream-status-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 16, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      transition: opacity 0.3s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #stream-status-text {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    /* --- TI DIAGNOSTIC TOOLBOX --- */
    .toolbox-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .toolbox-section h3 {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .grid-tools {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .tool-card-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .tool-card-btn:hover {
      background: rgba(0, 102, 204, 0.15);
      border-color: var(--accent);
    }

    /* Terminal Console */
    #console-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #080b12;
      overflow: hidden;
    }

    #console-output {
      flex: 1;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #a5d6ff;
      overflow-y: auto;
      line-height: 1.6;
    }

    .con-log-sys { color: var(--text-muted); font-style: italic; }
    .con-log-cmd { color: #58a6ff; font-weight: bold; }
    .con-log-out { color: #7ee787; }
    .con-log-err { color: var(--danger); }

    #console-input-bar {
      display: flex;
      border-top: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.9);
    }

    #console-input-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 16px;
      outline: none;
    }
  </style>
</head>
<body>

<!-- LOADER DE SESIÓN (visible mientras se verifica la cookie) -->
<div id="session-loader">
  <div class="sl-spinner"></div>
  <p>Verificando sesión...</p>
</div>

<!-- PANTALLA DE LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img class="login-logo" src="/soporte/download/logo?v=2.0.1" alt="Sercom Mx Logo" />
    <h2>Sercom<span>Desk</span></h2>
    <p>Centro de Operaciones y Soporte de TI</p>
    <div class="form-group">
      <label>Usuario Autorizado</label>
      <input type="text" id="login-user" placeholder="Ingresa tu usuario" />
    </div>
    <div class="form-group">
      <label>Contraseña de Red</label>
      <input type="password" id="login-pass" placeholder="••••••••" />
    </div>
    <!-- Cloudflare Turnstile -->
    <div style="display: flex; justify-content: center; padding: 12px 0;">
      <div id="my-turnstile-container"></div>
    </div>
    <button class="btn-login" id="btn-login-submit" onclick="attemptLogin()">Autenticar Credenciales</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- CABECERA -->
<div id="header">
  <div class="header-brand">
    <img class="header-logo" src="/soporte/download/logo?v=2.0.1" alt="Sercom Mx" />
    <span class="header-badge">SaaS TI Enterprise</span>
  </div>
  <button class="btn-action" style="max-width: 140px;" onclick="logout()">Desconectar</button>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="main-content">
  <div class="section-title">Equipos de Clientes Monitoreados</div>
  <div id="agents-grid">
    <!-- Renderizado Dinámico -->
  </div>
</div>

<!-- LIVE SESSION VIEW -->
<div id="session-view">
  <div id="session-sidebar">
    <div id="session-info-header">
      <h2 id="session-title">Consola de Control</h2>
      <span class="agent-status" style="background: rgba(16, 185, 129, 0.15); color: var(--success); font-size: 11px; padding: 3px 8px; border-radius: 99px;">Transmisión Cifrada</span>
    </div>

    <!-- CAJA DE HERRAMIENTAS DE TI -->
    <div class="toolbox-section">
      <h3>🛠️ Caja de Herramientas de TI</h3>
      <div class="grid-tools">
        <button class="tool-card-btn" onclick="startStream()">🖥️ Ver Pantalla</button>
        <button class="tool-card-btn" onclick="requestElevation()">🛡️ Solicitar Admin</button>
        <button class="tool-card-btn" onclick="runDiagnosticCmd('Get-Process')">📊 Ver Procesos</button>
        <button class="tool-card-btn" onclick="runDiagnosticCmd('Get-Service')">⚙️ Ver Servicios</button>
        <button class="tool-card-btn" onclick="runDiagnosticCmd('Clear-RecycleBin -Force')">🧹 Limpiar Temp</button>
        <button class="tool-card-btn" onclick="closeSession()">✕ Cerrar Sesión</button>
      </div>
    </div>

    <!-- CONSOLA POWERSHELL -->
    <div id="console-wrap">
      <div id="console-output"></div>
      <div id="console-input-bar">
        <input type="text" id="console-input" placeholder="Escribe comando PowerShell y presiona Enter..." />
      </div>
    </div>
  </div>

  <div class="live-stream-area">
    <div id="stream-status-overlay">
      <div class="spinner" id="stream-status-spinner"></div>
      <div id="stream-status-text">Iniciando conexión con la terminal remota...</div>
    </div>
    <canvas id="screen-canvas"></canvas>
    <div id="remote-cursor"></div>
  </div>
</div>

<script data-cfasync="false">
  let authenticated = false;
  let turnstileToken = null;
  let activeWs = null;
  let currentAgentId = null;
  const WS_RELAY_URL = window.location.protocol === 'https:' ? `wss://${window.location.host}` : `ws://${window.location.hostname}:6001`;

  const canvas = document.getElementById('screen-canvas');
  const ctx = canvas.getContext('2d');

  // ── Verificar sesión existente al cargar la página ────────────────────────
  (async function checkExistingSession() {
    const loader = document.getElementById('session-loader');
    const loginScreen = document.getElementById('login-screen');
    try {
      const res = await fetch('/soporte/agentes', { credentials: 'include' });
      if (res.ok) {
        // Cookie válida — ir directo al panel sin mostrar login
        authenticated = true;
        loader.style.display = 'none';
        startMonitoring();
      } else {
        // Sin sesión válida — mostrar login
        loader.style.display = 'none';
        loginScreen.style.display = 'flex';
      }
    } catch (e) {
      // Error de red — mostrar login por si acaso
      loader.style.display = 'none';
      loginScreen.style.display = 'flex';
    }
  })();

  window.onloadTurnstileCallback = function() {
    if (window.turnstile) {
      turnstile.render('#my-turnstile-container', {
        sitekey: '0x4AAAAAACGkJx3Djb7AtUCr',
        theme: 'dark',
        execution: 'render',
        callback: function(token) {
          turnstileToken = token;
        }
      });
    }
  };

  function attemptLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';

    // Intentar obtener el token en caliente (útil para el flujo invisible)
    let currentToken = turnstileToken;
    if (!currentToken && window.turnstile) {
      currentToken = turnstile.getResponse();
    }

    if (!currentToken) {
      errEl.textContent = 'Verificando seguridad de red... por favor intenta en un segundo.';
      if (window.turnstile) {
        try { turnstile.execute('#my-turnstile-container'); } catch(e) {}
      }
      return;
    }

    fetch('/soporte/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: u, pass: p, turnstileToken: currentToken })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        authenticated = true;
        document.getElementById('login-screen').style.display = 'none';
        startMonitoring();
      } else {
        errEl.textContent = data.error || 'Credenciales incorrectas';
        if (window.turnstile) turnstile.reset('#my-turnstile-container');
        turnstileToken = null;
      }
    })
    .catch(() => {
      errEl.textContent = 'Error de conexión con el servidor';
      if (window.turnstile) turnstile.reset('#my-turnstile-container');
      turnstileToken = null;
    });
  }

  function logout() {
    authenticated = false;
    document.getElementById('session-loader').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function fetchAgents() {
    if (!authenticated) return;
    try {
      const res = await fetch('/soporte/agentes', { credentials: 'include' });
      const agents = await res.json();
      renderGrid(agents);
    } catch {}
  }

  function renderGrid(agents) {
    const grid = document.getElementById('agents-grid');
    grid.innerHTML = '';

    if (Object.keys(agents).length === 0) {
      grid.innerHTML = '<div style="color:var(--text-muted); font-size:13px;">Buscando agentes activos en la red de soporte...</div>';
      return;
    }

    for (const [id, info] of Object.entries(agents)) {
      const h = info.health || {};
      const card = document.createElement('div');
      card.className = 'agent-card';

      // ── Tipo de dispositivo ─────────────────────────────────────────────
      const dtIcons = { Laptop: '💻', PC: '🖥️', Tablet: '📱', Celular: '📱' };
      const dtIcon  = dtIcons[h.deviceType] || '🖥️';
      const devTypeBadge = h.deviceType
        ? `<div class="hw-device-type">${dtIcon} ${h.deviceType}</div>` : '';

      // ── Fabricante y modelo ─────────────────────────────────────────────
      const makeModel = (h.manufacturer && h.model)
        ? `<div class="hw-make-model">${h.manufacturer} ${h.model}</div>` : '';

      // ── CPU ─────────────────────────────────────────────────────────────
      const cpuHtml = h.cpu
        ? `<div class="hw-block"><div class="hw-label">⚙️ CPU</div>
             <div class="hw-value">${h.cpu}</div></div>` : '';

      // ── RAM módulos ─────────────────────────────────────────────────────
      let ramHtml = '';
      if (h.ramGB !== undefined) {
        const ramUsed = h.ramGB && h.ramFreeGB ? (h.ramGB - h.ramFreeGB).toFixed(1) : '?';
        const ramTotal = h.ramGB ? h.ramGB.toFixed(1) : '?';
        let pillsHtml = '';
        if (h.ramModules && h.ramModules.length > 0) {
          pillsHtml = '<div class="hw-ram-pills">' +
            h.ramModules.map(m =>
              `<span class="hw-ram-pill">${m.gb}GB ${m.type}${m.speed ? ' '+m.speed+'MHz' : ''}</span>`
            ).join('') + '</div>';
        }
        ramHtml = `<div class="hw-block"><div class="hw-label">🧠 RAM</div>
          <div class="hw-value">${ramUsed} / ${ramTotal} GB usados</div>
          ${pillsHtml}</div>`;
      }

      // ── Discos ──────────────────────────────────────────────────────────
      let disksHtml = '';
      if (h.disks && h.disks.length > 0) {
        const diskItems = h.disks.map(d => {
          const pct = d.total > 0 ? Math.round((d.used / d.total) * 100) : 0;
          const barClass = pct >= 90 ? 'crit' : pct >= 75 ? 'warn' : '';
          return `<div style="margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#e2e8f0;margin-bottom:3px">
              <span>${d.drive}</span>
              <span>${d.free}GB libres de ${d.total}GB</span>
            </div>
            <div class="hw-disk-bar-wrap">
              <div class="hw-disk-bar ${barClass}" style="width:${pct}%"></div>
            </div></div>`;
        }).join('');
        disksHtml = `<div class="hw-block" style="grid-column:1/-1">
          <div class="hw-label">💾 Almacenamiento</div>${diskItems}</div>`;
      }

      // ── Badges sistema ──────────────────────────────────────────────────
      const badgeRow = `<div class="system-badge-row">
        <span class="sys-badge">OS: Windows</span>
        <span class="sys-badge">HTTPS</span>
      </div>`;

      const hwSection = (cpuHtml || ramHtml || disksHtml)
        ? `<div class="hw-grid">${cpuHtml}${ramHtml}${disksHtml}</div>` : '';

      card.innerHTML = `
        <div class="agent-card-header">
          <span class="agent-id-tag">${id}</span>
          <div class="pulse-indicator"></div>
        </div>
        <div>
          <div class="agent-host">${info.hostname || 'Terminal Desconectada'}</div>
          ${devTypeBadge}
          ${makeModel}
        </div>
        <div class="card-divider"></div>
        ${hwSection || badgeRow}
        ${hwSection ? badgeRow : ''}
        <div class="card-actions">
          <button class="btn-action primary" onclick="takeControl('${id}')">🖥️ Control Remoto</button>
        </div>
      `;
      grid.appendChild(card);
    }
  }

  function takeControl(id) {
    currentAgentId = id;
    document.getElementById('session-title').textContent = `Consola: ${id}`;
    document.getElementById('session-view').classList.add('active');
    
    // Configurar overlay en estado inicial de carga
    const overlay = document.getElementById('stream-status-overlay');
    const statusText = document.getElementById('stream-status-text');
    const spinner = document.getElementById('stream-status-spinner');
    
    overlay.style.display = 'flex';
    overlay.style.opacity = '1';
    spinner.style.display = 'block';
    statusText.innerHTML = `Estableciendo enlace de datos con terminal <b>${id}</b>...`;

    const wsUrl = `${WS_RELAY_URL}?type=panel&id=${id}&panel_key=${encodeURIComponent('SrC0mS0p0rt3#S3cur1tyKey#2026')}`;
    activeWs = new WebSocket(wsUrl);

    activeWs.onopen = () => {
      statusText.innerHTML = `Conexión establecida. Solicitando flujo de video...`;
      startStream();
    };

    activeWs.onclose = (event) => {
      spinner.style.display = 'none';
      overlay.style.display = 'flex';
      overlay.style.opacity = '1';
      statusText.innerHTML = `🔴 <b>Conexión cerrada.</b> Código: ${event.code}. El agente cerró la transmisión o se encuentra fuera de línea.`;
    };

    activeWs.onerror = (err) => {
      spinner.style.display = 'none';
      overlay.style.display = 'flex';
      overlay.style.opacity = '1';
      statusText.innerHTML = `❌ <b>Error de comunicación:</b> Falló el enlace de transporte del WebSocket. Verifica el firewall del servidor.`;
    };

    activeWs.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      if (msg.type === 'frame') {
        // Ocultar overlay al recibir el primer frame exitoso
        if (overlay.style.display !== 'none') {
          overlay.style.opacity = '0';
          setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
        const img = new Image();
        img.onload = () => {
          if (canvas.width !== msg.sw || canvas.height !== msg.sh) {
            canvas.width = msg.sw;
            canvas.height = msg.sh;
          }
          ctx.drawImage(img, msg.x, msg.y, msg.cellW, msg.cellH);
        };
        img.src = 'data:image/jpeg;base64,' + msg.data;
      } else if (msg.type === 'agent_offline') {
        spinner.style.display = 'none';
        statusText.innerHTML = `⚠️ <b>El agente se encuentra offline en el Relay.</b> Intentando despertarlo mediante REST API...`;
        // Si el agente está offline, enviarle la orden de iniciar transmisión
        console.log("El agente está offline en el relay. Despertándolo...");
        fetch('/soporte/cmd', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Sercom-API-Key': 'SrC0mS0p0rt3#S3cur1tyKey#2026'
          },
          body: JSON.stringify({ id: id, cmd: '__RELAY_START__' })
        }).catch(() => {});
      } else if (msg.type === 'agent_disconnected') {
        spinner.style.display = 'none';
        overlay.style.display = 'flex';
        overlay.style.opacity = '1';
        statusText.innerHTML = `⚠️ <b>El agente remoto se ha desconectado.</b> En espera de que vuelva a conectarse...`;
      }
    };

    // Enviar primer intento de despertar al agente de forma asíncrona
    setTimeout(() => {
      fetch('/soporte/cmd', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Sercom-API-Key': 'SrC0mS0p0rt3#S3cur1tyKey#2026'
        },
        body: JSON.stringify({ id: id, cmd: '__RELAY_START__' })
      }).catch(() => {});
    }, 100);
  }

  function startStream() {
    if (activeWs) {
      if (activeWs.readyState === WebSocket.OPEN) {
        activeWs.send(JSON.stringify({ type: 'start_stream' }));
      } else if (activeWs.readyState === WebSocket.CONNECTING) {
        activeWs.addEventListener('open', () => {
          activeWs.send(JSON.stringify({ type: 'start_stream' }));
        });
      }
    }
  }

  function requestElevation() {
    const uacCmd = `Start-Process powershell -Verb runas`;
    runDiagnosticCmd(uacCmd);
  }

  function runDiagnosticCmd(cmd) {
    log('cmd', `PS> ${cmd}`);
    fetch('/soporte/cmd', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Sercom-API-Key': 'SrC0mS0p0rt3#S3cur1tyKey#2026'
      },
      body: JSON.stringify({ id: currentAgentId, cmd })
    })
    .then(r => r.json())
    .then(data => log('out', data.output || data.error))
    .catch(() => log('err', 'Fallo al comunicar con la terminal remota'));
  }

  function closeSession() {
    if (activeWs) {
      activeWs.send(JSON.stringify({ type: 'stop_stream' }));
      activeWs.close();
    }
    // Enviar señal HTTP para indicarle al agente que detenga la transmisión
    if (currentAgentId) {
      fetch('/soporte/cmd', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Sercom-API-Key': 'SrC0mS0p0rt3#S3cur1tyKey#2026'
        },
        body: JSON.stringify({ id: currentAgentId, cmd: '__RELAY_STOP__' })
      }).catch(() => {});
    }
    document.getElementById('session-view').classList.remove('active');
  }

  function log(type, text) {
    const out = document.getElementById('console-output');
    const el = document.createElement('div');
    el.className = `con-log-${type}`;
    el.textContent = text;
    out.appendChild(el);
    out.scrollTop = out.scrollHeight;
  }

  document.getElementById('console-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = e.target.value;
      if (val) {
        runDiagnosticCmd(val);
        e.target.value = '';
      }
    }
  });

  function startMonitoring() {
    fetchAgents();
    setInterval(fetchAgents, 5000);
  }
</script>
